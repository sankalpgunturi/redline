<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="redline — land within budget. time and token budgets for Claude Code.">
  <defs>
    <!-- panel background: dark asphalt / carbon cockpit -->
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181d"/>
      <stop offset="0.55" stop-color="#0e0f13"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <!-- subtle vignette glow -->
    <radialGradient id="glow" cx="0.30" cy="0.45" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- carbon-fibre weave -->
    <pattern id="carbon" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#101216"/>
      <rect width="4" height="4" fill="#15181d"/>
      <rect x="4" y="4" width="4" height="4" fill="#15181d"/>
    </pattern>
    <!-- burn-down bar gradient: green -> yellow -> red -->
    <linearGradient id="burn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#21d07a"/>
      <stop offset="0.45" stop-color="#3ddc84"/>
      <stop offset="0.68" stop-color="#ffd23f"/>
      <stop offset="0.86" stop-color="#ff8c1a"/>
      <stop offset="1"    stop-color="#ff3b30"/>
    </linearGradient>
    <!-- tach arc: same family, used for the rim -->
    <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0"    stop-color="#21d07a"/>
      <stop offset="0.55" stop-color="#ffd23f"/>
      <stop offset="0.8"  stop-color="#ff8c1a"/>
      <stop offset="1"    stop-color="#ff3b30"/>
    </linearGradient>
    <!-- needle metal -->
    <linearGradient id="needle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#c4cad1"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="redglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="round"><rect x="8" y="8" width="1264" height="304" rx="22"/></clipPath>
  </defs>

  <!-- card -->
  <g clip-path="url(#round)">
    <rect x="8" y="8" width="1264" height="304" fill="url(#panel)"/>
    <rect x="8" y="8" width="1264" height="304" fill="url(#carbon)" opacity="0.5"/>
    <rect x="8" y="8" width="1264" height="304" fill="url(#glow)"/>

    <!-- diagonal speed streaks -->
    <g opacity="0.07" stroke="#ffffff" stroke-width="2">
      <line x1="980" y1="-40" x2="1340" y2="320"/>
      <line x1="1030" y1="-40" x2="1390" y2="320"/>
      <line x1="1080" y1="-40" x2="1440" y2="320"/>
    </g>

    <!-- racing stripe accent down the left edge -->
    <rect x="8" y="8" width="10" height="304" fill="#ff3b30"/>
    <rect x="22" y="8" width="4" height="304" fill="#ff3b30" opacity="0.35"/>

    <!-- ============ TACHOMETER (right side) ============ -->
    <!-- top semicircle gauge: sweep -90deg (left) through 0 (top) to +90deg (right).
         Red zone = last segment (+68..+90). Needle swept up to +58, JUST SHORT of red. -->
    <g transform="translate(1010,232)">
      <!-- bezel: only the top half reads, but a full disc gives depth -->
      <path d="M -150 0 A 150 150 0 0 1 150 0 Z" fill="#0b0c0f" stroke="#2a2e35" stroke-width="2"/>
      <path d="M -150 0 A 150 150 0 0 1 150 0" fill="none" stroke="#000000" stroke-width="5" opacity="0.5"/>

      <!-- major tick marks across the 180deg sweep -->
      <g stroke="#5b626b" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-90)"/>
        <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-67.5)"/>
        <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-45)"/>
        <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-22.5)"/>
        <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(0)"/>
        <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(22.5)"/>
        <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(45)"/>
      </g>
      <!-- red-zone ticks -->
      <g stroke="#ff3b30" stroke-width="3" stroke-linecap="round">
        <line x1="0" y1="-118" x2="0" y2="-136" transform="rotate(67.5)"/>
        <line x1="0" y1="-118" x2="0" y2="-136" transform="rotate(90)"/>
      </g>

      <!-- coloured arc rim: green(left/low) -> red(right/high) along the 180deg sweep -->
      <path d="M -124 0 A 124 124 0 0 1 124 0"
            fill="none" stroke="#23262c" stroke-width="16" stroke-linecap="round"/>
      <path d="M -124 0 A 124 124 0 0 1 124 0"
            fill="none" stroke="url(#arc)" stroke-width="10" stroke-linecap="round" opacity="0.95"/>

      <!-- REDLINE band: the ceiling you must not cross (+68deg .. +90deg) -->
      <path d="M 114.97 -46.45 A 124 124 0 0 1 124 0"
            fill="none" stroke="#ff3b30" stroke-width="15" stroke-linecap="butt" filter="url(#redglow)"/>
      <path d="M 114.97 -46.45 A 124 124 0 0 1 124 0"
            fill="none" stroke="#ff3b30" stroke-width="11" stroke-linecap="butt"/>

      <!-- "REDLINE" label set above the red band so it stays legible -->
      <text x="92" y="-92" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
            font-size="13" letter-spacing="2.5" fill="#ff6a60" font-weight="700">REDLINE</text>
      <!-- "IDLE" anchor on the green end -->
      <text x="-150" y="-12" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
            font-size="11" letter-spacing="2" fill="#4f9e72" font-weight="600">IDLE</text>

      <!-- needle: revved UP toward the line but stopping JUST SHORT of red (+62deg) -->
      <g transform="rotate(62)">
        <polygon points="-4.5,6 4.5,6 1.4,-130 -1.4,-130" fill="url(#needle)"/>
        <polygon points="-4.5,6 4.5,6 1.4,-130 -1.4,-130" fill="#ffffff" opacity="0.22" filter="url(#soft)"/>
      </g>
      <!-- hub -->
      <circle r="13" fill="#1a1d22" stroke="#3a3f47" stroke-width="2"/>
      <circle r="5" fill="#ff3b30"/>

      <!-- digital readout below the hub -->
      <text x="0" y="34" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
            font-size="24" fill="#e8ebef" font-weight="700" letter-spacing="1">94%</text>
      <text x="0" y="54" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
            font-size="11" fill="#7a828c" letter-spacing="2">OF BUDGET</text>
    </g>

    <!-- ============ WORDMARK + COPY (left side) ============ -->
    <g transform="translate(64,0)">
      <!-- wordmark -->
      <text x="0" y="138" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
            font-size="92" font-weight="800" letter-spacing="-3" fill="#f4f6f8">redline</text>
      <!-- literal red accent line under the wordmark -->
      <rect x="2" y="156" width="338" height="8" rx="4" fill="#ff3b30"/>
      <rect x="2" y="156" width="338" height="8" rx="4" fill="#ff3b30" opacity="0.6" filter="url(#redglow)"/>

      <!-- tagline -->
      <text x="2" y="206" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
            font-size="30" font-weight="600" fill="#cfd4da">land within budget.</text>

      <!-- subline -->
      <text x="3" y="236" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
            font-size="14" fill="#828a93" letter-spacing="0.5">time + token budgets for Claude Code.</text>

      <!-- ============ BURN-DOWN BAR ============ -->
      <g transform="translate(2,262)">
        <!-- track -->
        <rect x="0" y="0" width="620" height="18" rx="9" fill="#1c1f24" stroke="#2c3038" stroke-width="1"/>
        <!-- reserved landing zone (near the end, before the red cap) -->
        <rect x="540" y="0" width="80" height="18" rx="9" fill="#26211a"/>
        <rect x="540" y="0" width="80" height="18" fill="#ffd23f" opacity="0.06"/>
        <!-- fill: green->yellow->red, lands inside the landing zone, short of the end -->
        <clipPath id="barclip"><rect x="0" y="0" width="582" height="18" rx="9"/></clipPath>
        <g clip-path="url(#barclip)">
          <rect x="0" y="0" width="620" height="18" fill="url(#burn)"/>
        </g>
        <!-- leading edge marker (the car / current position) -->
        <rect x="578" y="-3" width="4" height="24" rx="2" fill="#ffffff"/>
        <circle cx="580" cy="9" r="6" fill="#ffffff"/>
        <circle cx="580" cy="9" r="3" fill="#ff3b30"/>
        <!-- finish line at the very end -->
        <g>
          <rect x="614" y="0" width="6" height="18" fill="#ffffff"/>
          <rect x="614" y="0" width="3" height="4.5" fill="#0e0f13"/>
          <rect x="617" y="4.5" width="3" height="4.5" fill="#0e0f13"/>
          <rect x="614" y="9" width="3" height="4.5" fill="#0e0f13"/>
          <rect x="617" y="13.5" width="3" height="4.5" fill="#0e0f13"/>
        </g>
        <!-- labels -->
        <text x="0" y="36" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
              font-size="11" fill="#7a828c" letter-spacing="1">START</text>
        <text x="552" y="36" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
              font-size="11" fill="#caa84a" letter-spacing="1">LANDING</text>
      </g>
    </g>

    <!-- top-right micro caption -->
    <text x="1248" y="44" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
          font-size="12" fill="#6b7019" opacity="0.9"></text>
    <text x="1248" y="44" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace"
          font-size="11" fill="#5f6770" letter-spacing="2">UNDER IS SUCCESS</text>
  </g>

  <!-- card border on top of everything -->
  <rect x="8" y="8" width="1264" height="304" rx="22" fill="none" stroke="#2c3138" stroke-width="1.5"/>
</svg>
