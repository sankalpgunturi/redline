<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>redline — land within budget</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(1200px 600px at 50% -10%, #1a1d23 0%, #0a0b0e 60%, #060708 100%);
    color: #e8ebef;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
  }
  .stage { width: min(960px, 92vw); }
  .card {
    position: relative;
    background:
      repeating-linear-gradient(45deg, #101216 0 4px, #15181d 4px 8px),
      linear-gradient(180deg, #16181d, #0e0f13 55%, #070809);
    background-blend-mode: overlay, normal;
    border: 1.5px solid #2c3138;
    border-radius: 22px;
    padding: 34px 40px 30px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .stripe { position:absolute; left:0; top:0; bottom:0; width:10px; background:#ff3b30; }
  .stripe::after { content:''; position:absolute; left:14px; top:0; bottom:0; width:4px; background:rgba(255,59,48,.35); }
  .streaks { position:absolute; inset:0; pointer-events:none; opacity:.07;
    background: repeating-linear-gradient(115deg, transparent 0 48px, #fff 48px 50px);
    -webkit-mask: linear-gradient(90deg, transparent 60%, #000); mask: linear-gradient(90deg, transparent 60%, #000); }

  .grid { display:grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; align-items:center; position:relative; }

  .wordmark { font-size: 76px; font-weight: 800; letter-spacing: -3px; line-height:.9; margin:0; }
  .accent { width: 280px; max-width:100%; height: 8px; border-radius: 4px; background:#ff3b30;
    box-shadow: 0 0 18px rgba(255,59,48,.6); margin: 14px 0 18px; }
  .tag { font-size: 26px; font-weight: 600; color:#cfd4da; margin: 0 0 8px; }
  .sub { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; color:#828a93; margin:0; }

  /* burn-down bar */
  .bar-wrap { margin-top: 26px; }
  .bar-track { position:relative; height:18px; border-radius:9px; background:#1c1f24; border:1px solid #2c3038; overflow:hidden; }
  .landing { position:absolute; right:6%; top:0; bottom:0; width:13%; background:rgba(255,210,63,.08); }
  .bar-fill { position:absolute; left:0; top:0; bottom:0; width:0%;
    background: linear-gradient(90deg, #21d07a 0%, #3ddc84 45%, #ffd23f 68%, #ff8c1a 86%, #ff3b30 100%);
    background-size: 1000px 100%;
    transition: width 2.6s cubic-bezier(.16,.84,.3,1); border-radius:9px; }
  .car { position:absolute; top:-3px; left:0%; width:4px; height:24px; background:#fff; border-radius:2px;
    transition: left 2.6s cubic-bezier(.16,.84,.3,1); box-shadow:0 0 10px rgba(255,255,255,.5); }
  .car::after { content:''; position:absolute; left:-4px; top:9px; width:12px; height:12px; border-radius:50%;
    background:#fff; box-shadow: inset 0 0 0 3px #ff3b30; }
  .finish { position:absolute; right:0; top:0; bottom:0; width:6px;
    background:
      linear-gradient(#fff 0 25%, transparent 0 50%, #fff 0 75%, transparent 0) 0 0 / 3px 9px,
      linear-gradient(transparent 0 25%, #fff 0 50%, transparent 0 75%, #fff 0) 3px 0 / 3px 9px,
      #0e0f13; }
  .bar-labels { display:flex; justify-content:space-between; font-family:ui-monospace,Menlo,monospace; font-size:11px;
    letter-spacing:1px; color:#7a828c; margin-top:8px; }
  .bar-labels .land { color:#caa84a; }

  /* gauge */
  .gauge { position:relative; }
  .micro { position:absolute; top:0; right:0; font-family:ui-monospace,Menlo,monospace; font-size:11px;
    letter-spacing:2px; color:#5f6770; }
  .readout { text-align:center; margin-top:-44px; position:relative; z-index:2; }
  .readout .pct { font-family:ui-monospace,Menlo,monospace; font-size:30px; font-weight:700; letter-spacing:1px; }
  .readout .lbl { font-family:ui-monospace,Menlo,monospace; font-size:11px; letter-spacing:2px; color:#7a828c; }

  .caption { text-align:center; margin-top:18px; font-family:ui-monospace,Menlo,monospace; font-size:12px;
    letter-spacing:1px; color:#6b727b; }
  .caption b { color:#ff6a60; }
  .replay { display:block; margin:14px auto 0; background:#1a1d22; color:#cfd4da; border:1px solid #313641;
    border-radius:8px; padding:7px 16px; font-size:13px; cursor:pointer; }
  .replay:hover { border-color:#ff3b30; color:#fff; }

  @media (max-width:760px){ .grid{grid-template-columns:1fr;} .gauge{margin-top:6px;} .wordmark{font-size:60px;} }
</style>
</head>
<body>
  <div class="stage">
    <div class="card">
      <div class="stripe"></div>
      <div class="streaks"></div>
      <div class="grid">
        <!-- left: wordmark + copy + bar -->
        <div>
          <h1 class="wordmark">redline</h1>
          <div class="accent"></div>
          <p class="tag">land within budget.</p>
          <p class="sub">time + token budgets for Claude Code.</p>

          <div class="bar-wrap">
            <div class="bar-track">
              <div class="landing"></div>
              <div class="bar-fill" id="fill"></div>
              <div class="car" id="car"></div>
              <div class="finish"></div>
            </div>
            <div class="bar-labels"><span>START</span><span class="land">LANDING ZONE</span></div>
          </div>
        </div>

        <!-- right: animated tachometer -->
        <div class="gauge">
          <span class="micro">UNDER IS SUCCESS</span>
          <svg viewBox="0 0 320 200" width="100%" aria-label="tachometer">
            <defs>
              <linearGradient id="arc" x1="0" y1="1" x2="1" y2="0">
                <stop offset="0" stop-color="#21d07a"/><stop offset="0.55" stop-color="#ffd23f"/>
                <stop offset="0.8" stop-color="#ff8c1a"/><stop offset="1" stop-color="#ff3b30"/>
              </linearGradient>
              <linearGradient id="needle" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#f4f6f8"/><stop offset="1" stop-color="#c4cad1"/>
              </linearGradient>
              <filter id="rg" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
            </defs>
            <g transform="translate(160,160)">
              <path d="M -150 0 A 150 150 0 0 1 150 0 Z" fill="#0b0c0f" stroke="#2a2e35" stroke-width="2"/>
              <!-- ticks -->
              <g stroke="#5b626b" stroke-width="2" stroke-linecap="round">
                <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-90)"/>
                <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-67.5)"/>
                <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-45)"/>
                <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(-22.5)"/>
                <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(0)"/>
                <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(22.5)"/>
                <line x1="0" y1="-118" x2="0" y2="-134" transform="rotate(45)"/>
              </g>
              <g stroke="#ff3b30" stroke-width="3" stroke-linecap="round">
                <line x1="0" y1="-118" x2="0" y2="-136" transform="rotate(67.5)"/>
                <line x1="0" y1="-118" x2="0" y2="-136" transform="rotate(90)"/>
              </g>
              <path d="M -124 0 A 124 124 0 0 1 124 0" fill="none" stroke="#23262c" stroke-width="16" stroke-linecap="round"/>
              <path d="M -124 0 A 124 124 0 0 1 124 0" fill="none" stroke="url(#arc)" stroke-width="10" stroke-linecap="round"/>
              <path d="M 114.97 -46.45 A 124 124 0 0 1 124 0" fill="none" stroke="#ff3b30" stroke-width="15" filter="url(#rg)"/>
              <path d="M 114.97 -46.45 A 124 124 0 0 1 124 0" fill="none" stroke="#ff3b30" stroke-width="11"/>
              <text x="92" y="-92" font-family="ui-monospace,Menlo,monospace" font-size="13" letter-spacing="2.5" fill="#ff6a60" font-weight="700">REDLINE</text>
              <text x="-150" y="-12" font-family="ui-monospace,Menlo,monospace" font-size="11" letter-spacing="2" fill="#4f9e72" font-weight="600">IDLE</text>
              <!-- animated needle -->
              <g id="needleG" transform="rotate(-90)">
                <polygon points="-4.5,6 4.5,6 1.4,-130 -1.4,-130" fill="url(#needle)"/>
              </g>
              <circle r="13" fill="#1a1d22" stroke="#3a3f47" stroke-width="2"/>
              <circle r="5" fill="#ff3b30"/>
            </g>
          </svg>
          <div class="readout">
            <div class="pct" id="pct">0%</div>
            <div class="lbl">OF BUDGET</div>
          </div>
        </div>
      </div>
      <div class="caption"><b>Under is success.</b> Over is a broken promise. The agent revs up &mdash; and lands just short.</div>
      <button class="replay" id="replay">&#8635; replay</button>
    </div>
  </div>

<script>
  // Animate needle from IDLE (-90deg) up toward — but stopping just short of — the redline.
  // Redline band starts at +68deg; landing target is +62deg.
  const needle = document.getElementById('needleG');
  const fill   = document.getElementById('fill');
  const car    = document.getElementById('car');
  const pct    = document.getElementById('pct');
  const TARGET_DEG = 62;          // just short of the +68deg red zone
  const TARGET_PCT = 94;          // burn-down lands in the landing zone (<100)
  const SWEEP_MS   = 2600;

  function easeOutBack(t){ const c1=1.2, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); }
  function easeOut(t){ return 1 - Math.pow(1-t, 3); }

  function run(){
    // bar uses CSS transition
    fill.style.width = '0%'; car.style.left = '0%'; pct.textContent = '0%';
    needle.setAttribute('transform','rotate(-90)');
    // force reflow so transitions restart
    void fill.offsetWidth;
    requestAnimationFrame(()=>{
      fill.style.width = TARGET_PCT + '%';
      car.style.left   = 'calc(' + TARGET_PCT + '% - 2px)';
    });
    // needle + counter driven by rAF for a decelerating sweep that settles short of red
    const start = performance.now();
    const fromDeg = -90, toDeg = TARGET_DEG;
    function frame(now){
      let t = Math.min(1, (now - start) / SWEEP_MS);
      const e = easeOutBack(t);          // gentle overshoot then settle = "revs and eases in"
      const deg = fromDeg + (toDeg - fromDeg) * Math.min(e, 1.0);
      needle.setAttribute('transform', 'rotate(' + deg.toFixed(2) + ')');
      pct.textContent = Math.round(TARGET_PCT * easeOut(t)) + '%';
      if (t < 1) requestAnimationFrame(frame);
      else { needle.setAttribute('transform','rotate(' + toDeg + ')'); pct.textContent = TARGET_PCT + '%'; }
    }
    requestAnimationFrame(frame);
  }
  document.getElementById('replay').addEventListener('click', run);
  setTimeout(run, 350);
</script>
</body>
</html>
