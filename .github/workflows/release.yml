name: Release
on:
  push: { tags: ["v*"] }
permissions: { contents: write }
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: bash test/test.sh
      - name: Create release if missing
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists - skipping."
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes --title "redline ${GITHUB_REF_NAME}"
          fi
      - name: Bump Homebrew tap
        env: { TAP_TOKEN: "${{ secrets.TAP_GITHUB_TOKEN }}" }
        run: |
          if [ -z "$TAP_TOKEN" ]; then echo "No TAP_GITHUB_TOKEN secret - skipping tap bump (do it manually)."; exit 0; fi
          SHA=$(curl -sL "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" | shasum -a 256 | cut -d' ' -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/sankalpgunturi/homebrew-redline" tap
          cd tap
          sed -i -E "s|/v[0-9.]+\.tar\.gz|/${GITHUB_REF_NAME}.tar.gz|; s|sha256 \"[a-f0-9]+\"|sha256 \"${SHA}\"|" Formula/redline.rb
          git config user.name "github-actions" && git config user.email "actions@users.noreply.github.com"
          if git diff --quiet; then echo "Formula already current - nothing to push."; else git commit -am "redline ${GITHUB_REF_NAME#v}" && git push; fi
