name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - name: Syntax check
        run: for f in bin/*.js; do node --check "$f"; done
      - name: Self-check
        run: bash test/test.sh
